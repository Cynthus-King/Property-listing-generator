<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Listing Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C8A96E;
      --dark: #1A1A2E;
      --surface: #F7F5F0;
      --card: #FFFFFF;
      --muted: #6B7280;
      --border: #E5E0D8;
      --green: #2D7A3A;
      --green-bg: #EEF9F0;
      --green-border: #B8E5BE;
      --red: #C53030;
      --red-bg: #FFF5F5;
      --red-border: #FEB2B2;
    }

    body {
      font-family: Georgia, serif;
      background: var(--surface);
      color: var(--dark);
      min-height: 100vh;
    }

    header {
      background: var(--dark);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 3px solid var(--gold);
    }

    .logo {
      width: 44px; height: 44px;
      background: var(--gold);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    header .sub {
      color: var(--gold);
      font-family: sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    header h1 {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.4px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 20px; }
    }

    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-title {
      font-family: sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      font-family: Georgia, serif;
      color: var(--dark);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
    }

    textarea { resize: vertical; min-height: 80px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tone-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .tone-btn {
      padding: 10px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      transition: all 0.2s;
      text-align: center;
    }

    .tone-btn.active {
      background: var(--dark);
      color: var(--gold);
      border-color: var(--dark);
    }

    .generate-btn {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: sans-serif;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    .generate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .output-card {
      grid-column: 1 / -1;
      background: var(--card);
      border-radius: 8px;
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .output-header .card-title { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

    .badge {
      display: inline-block;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-family: sans-serif;
      font-weight: 600;
      margin-left: 10px;
    }

    .copy-btn {
      padding: 8px 18px;
      background: transparent;
      color: var(--dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .copy-btn:hover { background: var(--surface); }

    #output-text {
      font-size: 16px;
      line-height: 1.85;
      color: var(--dark);
      white-space: pre-wrap;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-family: sans-serif;
      font-size: 14px;
      padding: 16px 0;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 6px;
      padding: 14px;
      color: var(--red);
      font-family: sans-serif;
      font-size: 13px;
      margin-top: 10px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">🏡</div>
  <div>
    <p class="sub">AI-Powered</p>
    <h1>Property Listing Generator</h1>
  </div>
</header>

<main>
  <div class="grid">

    <!-- LEFT CARD -->
    <div class="card">
      <p class="card-title">Property Details</p>

      <div class="field">
        <label>Property Address *</label>
        <input id="address" type="text" placeholder="e.g. 42 Maple Street, Austin TX" />
      </div>

      <div class="row">
        <div class="field">
          <label>Asking Price</label>
          <input id="price" type="text" placeholder="e.g. 850,000" />
        </div>
        <div class="field">
          <label>Property Type</label>
          <select id="propType">
            <option>House</option>
            <option>Apartment / Condo</option>
            <option>Townhouse</option>
            <option>Villa</option>
            <option>Land</option>
            <option>Commercial</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Bedrooms *</label>
          <input id="beds" type="number" min="0" placeholder="e.g. 4" />
        </div>
        <div class="field">
          <label>Bathrooms *</label>
          <input id="baths" type="number" min="0" placeholder="e.g. 2" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Parking Spaces</label>
          <input id="parking" type="number" min="0" placeholder="e.g. 2" />
        </div>
        <div class="field">
          <label>Land Size</label>
          <input id="land" type="text" placeholder="e.g. 600 sqm" />
        </div>
      </div>

      <div class="field">
        <label>Interior Size</label>
        <input id="interior" type="text" placeholder="e.g. 2,400 sq ft" />
      </div>
    </div>

    <!-- RIGHT CARD -->
    <div class="card">
      <p class="card-title">Features & Style</p>

      <div class="field">
        <label>Key Features</label>
        <textarea id="features" placeholder="e.g. Renovated kitchen, pool, hardwood floors, city views, new roof..."></textarea>
      </div>

      <div class="field">
        <label>Neighborhood / Area Highlights</label>
        <textarea id="neighborhood" placeholder="e.g. Walking distance to top schools, 5 mins to downtown, great cafes nearby..."></textarea>
      </div>

      <div class="field">
        <label>Anything Else to Highlight</label>
        <input id="extras" type="text" placeholder="e.g. Motivated seller, recently renovated, open to offers..." />
      </div>

      <div class="field">
        <label>Listing Tone</label>
        <div class="tone-row">
          <button class="tone-btn active" data-tone="Luxury" onclick="setTone(this)">✨ Luxury</button>
          <button class="tone-btn" data-tone="Friendly" onclick="setTone(this)">🏠 Friendly</button>
          <button class="tone-btn" data-tone="Investment" onclick="setTone(this)">📈 Investment</button>
        </div>
      </div>

      <div id="error-box" class="error-box hidden"></div>

      <button class="generate-btn" id="gen-btn" onclick="generate()">Generate Listing →</button>
    </div>

    <!-- OUTPUT -->
    <div class="output-card hidden" id="output-card">
      <div class="output-header">
        <p class="card-title">
          Generated Listing
          <span class="badge hidden" id="ready-badge">✓ Ready to use</span>
        </p>
        <button class="copy-btn hidden" id="copy-btn" onclick="copyText()">Copy Text</button>
      </div>
      <div class="loading hidden" id="loading-indicator">
        <div class="spinner"></div>
        Writing your listing...
      </div>
      <p id="output-text"></p>
    </div>

  </div>
</main>

<script>
  let selectedTone = "Luxury";

  function setTone(btn) {
    document.querySelectorAll(".tone-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedTone = btn.dataset.tone;
  }

  function showError(msg) {
    const box = document.getElementById("error-box");
    box.textContent = msg;
    box.classList.remove("hidden");
  }

  function hideError() {
    document.getElementById("error-box").classList.add("hidden");
  }

  async function generate() {
    const address = document.getElementById("address").value.trim();
    const beds = document.getElementById("beds").value.trim();
    const baths = document.getElementById("baths").value.trim();

    hideError();

    if (!address || !beds || !baths) {
      showError("Please fill in at least: Address, Bedrooms, and Bathrooms.");
      return;
    }

    const price = document.getElementById("price").value.trim();
    const propType = document.getElementById("propType").value;
    const parking = document.getElementById("parking").value.trim();
    const land = document.getElementById("land").value.trim();
    const interior = document.getElementById("interior").value.trim();
    const features = document.getElementById("features").value.trim();
    const neighborhood = document.getElementById("neighborhood").value.trim();
    const extras = document.getElementById("extras").value.trim();

    const btn = document.getElementById("gen-btn");
    btn.disabled = true;
    btn.textContent = "Generating...";

    const outputCard = document.getElementById("output-card");
    const loading = document.getElementById("loading-indicator");
    const outputText = document.getElementById("output-text");
    const readyBadge = document.getElementById("ready-badge");
    const copyBtn = document.getElementById("copy-btn");

    outputCard.classList.remove("hidden");
    loading.classList.remove("hidden");
    outputText.textContent = "";
    readyBadge.classList.add("hidden");
    copyBtn.classList.add("hidden");

    outputCard.scrollIntoView({ behavior: "smooth", block: "start" });

    const prompt = `You are an expert real estate copywriter. Write a compelling property listing description based on these details:

Property Address: ${address}
Asking Price: ${price ? "$" + price : "Not specified"}
Property Type: ${propType}
Bedrooms: ${beds}
Bathrooms: ${baths}
Parking Spaces: ${parking || "Not specified"}
Land Size: ${land || "Not specified"}
Interior Size: ${interior || "Not specified"}
Key Features: ${features || "None listed"}
Neighborhood/Area: ${neighborhood || "Not specified"}
Additional Notes: ${extras || "None"}
Tone: ${selectedTone}

Tone guide:
- Luxury: Elegant, aspirational, premium language. Evoke lifestyle and exclusivity.
- Friendly: Warm, welcoming, approachable. Perfect for family homes.
- Investment: Data-focused, highlight ROI potential, rental yield, growth suburb.

Write 3 paragraphs. No bullet points. No headers. Just flowing, persuasive prose that makes a buyer want to view this property immediately. End with a strong call to action.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = (data.content || []).map(b => b.text || "").join("");

      loading.classList.add("hidden");
      outputText.textContent = text;
      readyBadge.classList.remove("hidden");
      copyBtn.classList.remove("hidden");

    } catch (err) {
      loading.classList.add("hidden");
      showError("Something went wrong. Please check your connection and try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Generate Listing →";
    }
  }

  function copyText() {
    const text = document.getElementById("output-text").textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "✓ Copied!";
      setTimeout(() => btn.textContent = "Copy Text", 2000);
    });
  }
</script>
</body>
</html>
